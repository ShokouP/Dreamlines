<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardForge SDD — 登录 / 注册</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="page-login">
<div class="login-card">
  <div class="login-card__brand">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
    </svg>
  </div>
  <h1>CardForge SDD</h1>
  <div class="subtitle" id="auth-subtitle">数据驱动卡牌游戏管理后台</div>

  <!-- Login form -->
  <div id="login-form">
    <div class="field" id="login-username-field">
      <label>用户名</label>
      <input type="text" id="login-username" placeholder="admin" autocomplete="username">
    </div>
    <div class="field" id="login-password-field">
      <label>密码</label>
      <input type="password" id="login-password" placeholder="••••••" autocomplete="current-password">
    </div>
    <button id="btn-login">登 录</button>
    <div class="auth-switch">没有账号？<a href="#" id="link-register">立即注册</a></div>
  </div>

  <!-- Register form -->
  <div id="register-form" class="hidden">
    <div class="field" id="reg-username-field">
      <label>用户名</label>
      <input type="text" id="reg-username" placeholder="player1" autocomplete="username">
    </div>
    <div class="field" id="reg-display-field">
      <label>显示名称</label>
      <input type="text" id="reg-display" placeholder="可选">
    </div>
    <div class="field" id="reg-password-field">
      <label>密码</label>
      <input type="password" id="reg-password" placeholder="至少 6 位" autocomplete="new-password">
    </div>
    <div class="field" id="reg-confirm-field">
      <label>确认密码</label>
      <input type="password" id="reg-confirm" placeholder="再次输入密码" autocomplete="new-password">
    </div>
    <button id="btn-register" class="primary">注 册</button>
    <div class="auth-switch">已有账号？<a href="#" id="link-login">去登录</a></div>
  </div>

  <div id="error" aria-live="polite"></div>
</div>
<script src="auth.js"></script>
<script src="login.js"></script>
</body>
</html>
